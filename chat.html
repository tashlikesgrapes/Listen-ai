<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listen AI - Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="chat.css">
    <style>
        body {
            background: linear-gradient(135deg, #1b0f33 0%, #2d0f4f 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Inter', sans-serif;
            color: white;
        }

        .chat-card {
            background: rgba(116, 66, 201, 0.16);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 103, 255, 0.25);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .bg-primary { background-color: #7c3aed !important; }
        .border-secondary { border-color: #6e4dd8 !important; }

        .chat-header {
            background: rgba(255, 255, 255, 0.03);
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        #chatWindow {
            height: 450px;
            overflow-y: auto;
            padding: 2rem;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
        }

        .message {
            margin-bottom: 1.5rem;
            max-width: 80%;
            padding: 1rem 1.25rem;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .message-ai {
            background: rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-user {
            background: #4f46e5; /* Vibrant indigo */
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            margin-left: auto;
        }

        .input-area {
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.2);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            border-radius: 12px;
            padding: 0.75rem 1.25rem;
        }

        .form-control:focus {
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.4);
        }

        .btn-send {
            background: #4f46e5;
            border: none;
            border-radius: 12px;
            padding: 0 1.5rem;
            transition: all 0.2s;
        }

        .btn-send:hover {
            background: #4338ca;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            
            <div class="chat-card">
                <div class="chat-header d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center">
                        <div class="bg-primary rounded-circle me-3" style="width: 40px; height: 40px; display: grid; place-items: center;">
                            <i class="bi bi-robot"></i>
                        </div>
                        <div>
                            <h6 class="mb-0">Listen AI</h6>
                            <small class="text-success">● Online</small>
                        </div>
                    </div>
                    <a href="index.html" class="btn btn-sm btn-outline-light opacity-50">Exit</a>
                </div>

                <div id="chatWindow" class="d-flex flex-column">
                    <div class="message message-ai">
                        Hi there. I'm here to listen to whatever is on your mind. How are you feeling right now?
                    </div>
                </div>

                <form id="chatForm" class="input-area">
                    <div class="input-group">
                        <input type="text" id="userInput" class="form-control" placeholder="Type your message..." autocomplete="off">
                        <button class="btn btn-primary btn-send" type="submit">
                            <i class="bi bi-send-fill"></i>
                        </button>
                    </div>
                </form>
            </div>
            
            <p class="text-center mt-4 text-white-50 small">
                Your privacy is important. This is a safe space for you to vent.
            </p>
        </div>
    </div>
</div>
<footer
      class="text-center py-5 border-top border-secondary opacity-50 mt-5"
    >
      <p class="small">© 2026 Listen AI</p>
    </footer>
<script>
    const chatForm = document.getElementById('chatForm');
    const chatWindow = document.getElementById('chatWindow');
    const userInput = document.getElementById('userInput');

    chatForm.addEventListener('submit', (e) => {
        e.preventDefault();
        if (!userInput.value.trim()) return;

        const message = userInput.value;
        addMessage(message, 'user');
        userInput.value = '';

        // Simulate AI "Thinking"
        setTimeout(() => {
            addMessage("I hear you. Tell me more about that.", 'ai');
        }, 800);
    });

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `message message-${sender}`;
        div.innerText = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }
</script>

</body>
</html>
