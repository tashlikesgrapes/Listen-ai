<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal - Listen AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #0f172a; color: white; }</style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h1 class="display-5 fw-bold mb-4">Personal Journal</h1>
                <div class="card bg-dark border-secondary p-4">
                    <label class="form-label opacity-75">How are you feeling today?</label>
                    <textarea class="form-control bg-dark text-white border-secondary mb-3" rows="8"></textarea>
                    <button class="btn btn-primary px-4">Save Entry</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
